The file /tmp/buggy-queue.ts contains a race condition where concurrent
`enqueue` calls can lose tasks when `processNext` finishes before a
concurrent `enqueue` completes its `this.items.push()`.

Fix the race condition and save the corrected implementation to
/tmp/fixed-queue.ts. The fix should ensure no tasks are lost under
concurrent enqueue operations.
