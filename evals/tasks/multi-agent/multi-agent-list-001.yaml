Implement a distributed web scraper using multi-agent coordination:

1. Spawn a coordinator agent that:
   - Receives a list of 5 URL targets
   - Dispatches each URL to a worker agent
   - Collects and merges results
   - Handles worker failures gracefully

2. Each worker agent should:
   - Accept a single URL
   - Fetch and parse the content
   - Extract title, description, and key terms
   - Return structured JSON

3. Save the combined results to /tmp/scraped-data.json
