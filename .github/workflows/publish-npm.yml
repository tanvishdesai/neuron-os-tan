name: Publish npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish neuron-aegis to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "⚠️  NPM_TOKEN secret not set — skipping publish"
            echo "   Set it at: https://github.com/KunjShah95/neuron-os/settings/secrets/actions"
            exit 0
          fi
          npm publish
        working-directory: packages/aegis
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
