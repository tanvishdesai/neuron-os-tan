name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (root project)
        run: bun run --bun tsc --noEmit

      - name: Run tests
        run: bun run scripts/run-tests.ts

      - name: Run benchmarks
        run: bun run scripts/bench-memory-system.ts
        env:
          NODE_ENV: test

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache dashboard dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: dashboard-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: dashboard-bun-

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Build dashboard
        run: bun run build
        working-directory: dashboard

      - name: Upload dashboard build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          if-no-files-found: warn

  dashboard-test:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache dashboard dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: dashboard-bun-${{ hashFiles('dashboard/bun.lock') }}
          restore-keys: dashboard-bun-

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Run dashboard tests
        run: bun run test -- --coverage
        working-directory: dashboard

  website:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache website dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: website-bun-${{ hashFiles('website/package-lock.json') }}
          restore-keys: website-bun-

      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: website

      - name: Typecheck website
        run: bunx tsc -b
        working-directory: website

      - name: Build website
        run: bun run build
        working-directory: website

      - name: Upload website build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/
          if-no-files-found: warn

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.x'

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install dashboard dependencies
        run: bun install --frozen-lockfile
        working-directory: dashboard

      - name: Run coverage (bun test files)
        run: bun test --coverage --coverage-reporter=lcov --coverage-reporter=text --path-ignore-patterns="tmp*/**" 2>&1

      - name: Run dashboard coverage (vitest)
        run: |
          cd dashboard && bunx vitest run --coverage 2>&1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: bun-test-coverage
          fail_ci_if_error: false

      - name: Upload dashboard coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          directory: dashboard/coverage
          flags: dashboard
          name: dashboard-coverage
          fail_ci_if_error: false

      - name: Coverage summary
        if: always()
        run: |
          echo "📊 Coverage uploaded to Codecov"
          [ -f coverage/lcov.info ] && echo "  • $(grep -c '^SF:' coverage/lcov.info) source files in bun test report"
          [ -f dashboard/coverage/lcov.info ] && echo "  • $(grep -c '^SF:' dashboard/coverage/lcov.info) source files in dashboard report"

      - name: Upload coverage report (artifact backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            coverage/
            dashboard/coverage/
          if-no-files-found: warn

  aegis-ci-fix:
    name: Aegis CI Auto-Fix
    if: failure() && github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run Aegis CI Fix
        uses: ./.github/actions/aegis-ci-fix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-merge: "true"