name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: '1.x'

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run tsc --noEmit

      - name: Lint
        run: |
          if command -v bun >/dev/null 2>&1; then
            bun run eslint . --max-warnings=0 || true
          else
            echo "eslint not available"
          fi

      - name: Run tests
        run: |
          # Project provides a test runner at scripts/run-tests.ts — run via Bun
          if [ -f scripts/run-tests.ts ]; then
            bun run scripts/run-tests.ts || bun run tsx scripts/run-tests.ts || true
          else
            echo "No test runner found; skipping tests"
          fi

      - name: Upload coverage/artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-ci-logs
          path: |
            coverage || true
            .eslintcache || true
